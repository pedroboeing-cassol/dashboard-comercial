<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ECOMM — Performance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{background:#0b0d13;color:#dde2f0;font-family:'DM Mono';padding:20px}
select,button{padding:6px;margin:5px}
.kpis{display:flex;gap:15px;margin:20px 0}
.kpi{background:#181b26;padding:15px;border-radius:8px}
table{width:100%;margin-top:20px;font-size:12px}
td,th{padding:6px;text-align:left}
canvas{margin-top:20px}
</style>
</head>

<body>

<h2>ECOMM Performance</h2>
<p id="status">Carregando...</p>

<div>
<select id="cat"></select>
<select id="sub"></select>
<button onclick="apply()">Filtrar</button>
</div>

<div class="kpis">
<div class="kpi">Custo: <span id="cst"></span></div>
<div class="kpi">Cliques: <span id="cli"></span></div>
<div class="kpi">Conv: <span id="cnv"></span></div>
<div class="kpi">ROAS: <span id="roas"></span></div>
</div>

<canvas id="chart"></canvas>

<table border="1">
<thead>
<tr><th>Data</th><th>Produto</th><th>Custo</th><th>Conv</th></tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>

const SHEET_ID="1xR3KXz4R0RvFx37rhXR-CqRM8YtJFPJoXIOWvR_6BG0";
const TAB="2026-04";

let raw=[],filt=[];

async function load(){

  const url=`https://opensheet.elk.sh/${SHEET_ID}/${TAB}`;

  const res=await fetch(url);
  const data=await res.json();

  raw=data.map(r=>({
    date:r["Data"],
    cat:r["Cat(L1)"],
    sub:r["Sub"],
    title:r["Título"],
    cst:+r["Custo"]||0,
    cli:+r["Cli"]||0,
    cnv:+r["Conversões"]||0,
    vcv:+r["ValConv"]||0
  }));

  document.getElementById("status").innerText="Atualizado "+new Date().toLocaleString();

  buildFilters();
  apply();
}

function buildFilters(){
  const cats=[...new Set(raw.map(r=>r.cat))];
  document.getElementById("cat").innerHTML='<option value="">Todas</option>'+cats.map(c=>`<option>${c}</option>`);

  document.getElementById("cat").onchange=()=>{
    const c=document.getElementById("cat").value;
    const subs=[...new Set(raw.filter(r=>!c||r.cat===c).map(r=>r.sub))];
    document.getElementById("sub").innerHTML='<option value="">Todas</option>'+subs.map(s=>`<option>${s}</option>`);
  }
}

function apply(){
  const c=document.getElementById("cat").value;
  const s=document.getElementById("sub").value;

  filt=raw.filter(r=>(!c||r.cat===c)&&(!s||r.sub===s));

  render();
}

function render(){

  const sum=(k)=>filt.reduce((a,r)=>a+r[k],0);

  const cst=sum("cst"),cli=sum("cli"),cnv=sum("cnv"),vcv=sum("vcv");

  document.getElementById("cst").innerText=cst.toFixed(2);
  document.getElementById("cli").innerText=cli;
  document.getElementById("cnv").innerText=cnv;
  document.getElementById("roas").innerText=(vcv/cst||0).toFixed(2);

  // tabela
  document.getElementById("tb").innerHTML=filt.slice(0,50).map(r=>
    `<tr><td>${r.date}</td><td>${r.title}</td><td>${r.cst}</td><td>${r.cnv}</td></tr>`
  ).join("");

  // gráfico
  const map={};
  filt.forEach(r=>{
    if(!map[r.date]) map[r.date]={c:0,cv:0};
    map[r.date].c+=r.cst;
    map[r.date].cv+=r.cnv;
  });

  const labels=Object.keys(map);

  new Chart(document.getElementById("chart"),{
    data:{
      labels,
      datasets:[
        {type:"bar",label:"Custo",data:labels.map(l=>map[l].c)},
        {type:"line",label:"Conv",data:labels.map(l=>map[l].cv)}
      ]
    }
  });
}

load();

</script>

</body>
</html>
